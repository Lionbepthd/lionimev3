<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nonton Episode - Lionime</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #121212;
      color: #fff;
      padding: 1rem;
    }
    .video-container {
      max-width: 800px;
      margin: 0 auto;
    }
    video {
      width: 100%;
      height: auto;
    }
    .loading {
      color: #aaa;
    }
    .server-list {
      margin-top: 1rem;
    }
    .server-btn {
      display: inline-block;
      margin-right: 0.5rem;
      padding: 0.5rem 1rem;
      background-color: #2a2a2a;
      color: white;
      border: none;
      border-radius: 4px;
      cursor: pointer;
    }
    .server-btn:hover {
      background-color: #333;
    }
  </style>
</head>
<body>
  <a href="javascript:history.back()">← Kembali ke Detail</a>
  <h1>Menonton Episode</h1>
  <div id="playerContainer">
    <p class="loading">Memuat video...</p>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const episodeSlug = urlParams.get('episodeSlug');

    async function loadEpisode(episodeSlug) {
      if (!episodeSlug) {
        document.getElementById('playerContainer').innerHTML = '<p>Episode slug tidak ditemukan.</p>';
        return;
      }

      try {
        const response = await fetch(`https://www.sankavollerei.com/anime/episode/${episodeSlug}`);
        const data = await response.json();

        if (!data.data || !data.data.servers || data.data.servers.length === 0) {
          document.getElementById('playerContainer').innerHTML = '<p>Video tidak ditemukan untuk episode ini.</p>';
          return;
        }

        const servers = data.data.servers;
        const playerContainer = document.getElementById('playerContainer');
        playerContainer.innerHTML = `<div class="video-container"><div id="videoPlayer"></div></div>`;

        const serverListDiv = document.createElement('div');
        serverListDiv.className = 'server-list';
        serverListDiv.innerHTML = '<h3>Pilih Server:</h3>';

        servers.forEach(server => {
          const btn = document.createElement('button');
          btn.className = 'server-btn';
          btn.textContent = server.name;
          btn.onclick = () => playVideo(server.id);
          serverListDiv.appendChild(btn);
        });

        playerContainer.appendChild(serverListDiv);

        if (servers.length > 0) {
          playVideo(servers[0].id);
        }

      } catch (error) {
        console.error("Error loading episode:", error);
        document.getElementById('playerContainer').innerHTML = '<p>Gagal memuat video.</p>';
      }
    }

    async function playVideo(serverId) {
      try {
        const response = await fetch(`https://www.sankavollerei.com/anime/server/${serverId}`);
        const data = await response.json();

        if (!data.data || !data.data.url) {
          document.getElementById('videoPlayer').innerHTML = '<p>URL video tidak ditemukan.</p>';
          return;
        }

        const videoUrl = data.data.url;
        document.getElementById('videoPlayer').innerHTML = `<iframe src="${videoUrl}" width="100%" height="500" frameborder="0" allowfullscreen></iframe>`;

      } catch (error) {
        console.error("Error playing video:", error);
        document.getElementById('videoPlayer').innerHTML = '<p>Gagal memuat video.</p>';
      }
    }

    if (episodeSlug) {
      loadEpisode(episodeSlug);
    } else {
      document.getElementById('playerContainer').innerHTML = '<p>Episode slug tidak ditemukan.</p>';
    }
  </script>
</body>
</html>
