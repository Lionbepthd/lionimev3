<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Nonton Episode - Lionime</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #121212;
      color: #fff;
      padding: 1rem;
    }
    video {
      width: 100%;
      max-width: 800px;
      height: auto;
    }
    .loading {
      color: #aaa;
    }
  </style>
</head>
<body>
  <a href="javascript:history.back()">← Kembali ke Detail</a>
  <h1>Menonton Episode</h1>
  <div id="playerContainer">
    <p class="loading">Memuat video...</p>
  </div>

  <script>
    const urlParams = new URLSearchParams(window.location.search);
    const episodeId = urlParams.get('episodeId');
    const source = urlParams.get('source') || 'gogoanime'; // Default ke gogoanime

    async function loadEpisode(episodeId, source) {
      if (!episodeId) {
        document.getElementById('playerContainer').innerHTML = '<p>Episode ID tidak ditemukan.</p>';
        return;
      }

      try {
        // Ambil data episode dari Consumet berdasarkan ID
        let apiUrl = `https://api.consumet.org/anime/${source}/episode?id=${episodeId}`;
        if(source === 'gogoanime') {
            apiUrl = `https://api.consumet.org/anime/gogoanime/episode?id=${episodeId}`;
        }
        // Tambahkan else if untuk source lain jika diperlukan

        const response = await fetch(apiUrl);
        const data = await response.json();

        if (!data.sources || data.sources.length === 0) {
          document.getElementById('playerContainer').innerHTML = '<p>Video tidak ditemukan untuk episode ini.</p>';
          return;
        }

        // Ambil link video pertama (bisa disesuaikan untuk kualitas)
        const videoUrl = data.sources[0].url;

        // Tampilkan video player
        document.getElementById('playerContainer').innerHTML = `<video controls><source src="${videoUrl}" type="video/mp4">Browser kamu tidak mendukung video.</video>`;

      } catch (error) {
        console.error("Error loading episode:", error);
        document.getElementById('playerContainer').innerHTML = '<p>Gagal memuat video.</p>';
      }
    }

    if (episodeId) {
      loadEpisode(episodeId, source);
    } else {
      document.getElementById('playerContainer').innerHTML = '<p>Episode ID tidak ditemukan.</p>';
    }
  </script>
</body>
</html>
